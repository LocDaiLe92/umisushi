name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/UmiSushi.Web/UmiSushi.Web.csproj -c Release -o release

      # Rewrite base href from "/" to "/umisushi/" for project-pages hosting
      - name: Set base href
        run: sed -i 's|<base href="/" />|<base href="/umisushi/" />|g' release/wwwroot/index.html

      # SPA fallback so deep links (e.g. /menu) work
      - name: Add 404 fallback
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # Prevent Jekyll from ignoring the _framework folder
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
